# Netlify configuration for TRC — The Right Click
# Static HTML site — no build step needed

[build]
  publish = "."   # Publish root folder (where index.html lives)

# Redirect all 404s back to index.html (optional, for clean URLs)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
